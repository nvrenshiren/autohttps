name: Portable Desktop

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: portable-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # 滚动更新 nightly prerelease 需要

jobs:
  windows-portable:
    name: Windows portable zip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # desktop.exe 经 rust-embed 内嵌 frontend/dist,必须先构建前端
      - name: Build frontend (dist embedded into exe)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build desktop (release)
        run: cargo build --release -p desktop

      - name: Package portable zip
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)
          $name = "autohttps-windows-x86_64-$sha-portable"
          New-Item -ItemType Directory -Path "dist/$name" | Out-Null
          Copy-Item target/release/desktop.exe "dist/$name/autohttps.exe"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          echo "PKG_NAME=$name" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}
          path: dist/${{ env.PKG_NAME }}.zip
          if-no-files-found: error

      # 滚动 nightly prerelease:每次 push 覆盖,始终指向最新 portable 包
      - name: Update nightly prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly (${{ github.sha }})
          prerelease: true
          files: dist/${{ env.PKG_NAME }}.zip
