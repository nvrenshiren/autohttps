name: Portable Desktop

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: portable-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # 创建 Release 需要

jobs:
  windows-portable:
    name: Windows portable zip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # desktop.exe 经 rust-embed 内嵌 frontend/dist,必须先构建前端
      - name: Build frontend (dist embedded into exe)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build desktop (release)
        run: cargo build --release -p desktop

      # 版本号 = tauri.conf.json version + CI 运行序号(semver 预发布),如 0.1.0-dev.42
      - name: Resolve version
        shell: pwsh
        run: |
          $base = (Get-Content crates/desktop/tauri.conf.json | ConvertFrom-Json).version
          $ver = "$base-dev.${{ github.run_number }}"
          echo "APP_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package portable zip
        shell: pwsh
        run: |
          $name = "autohttps-windows-x86_64-v${{ env.APP_VERSION }}-portable"
          New-Item -ItemType Directory -Path "dist/$name" | Out-Null
          Copy-Item target/release/desktop.exe "dist/$name/autohttps.exe"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          echo "PKG_NAME=$name" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}
          path: dist/${{ env.PKG_NAME }}.zip
          if-no-files-found: error

      # 每次 push 一个新 prerelease,首页 Releases 栏可见最新版
      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: v${{ env.APP_VERSION }}
          prerelease: true
          files: dist/${{ env.PKG_NAME }}.zip
