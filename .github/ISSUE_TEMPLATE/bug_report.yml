name: 缺陷报告 (Bug report)
description: 报告一个缺陷,帮助我们修复
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: 问题描述
      description: 发生了什么?实际现象是什么?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 …
        2. 点击 …
        3. 出现 …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
  - type: dropdown
    id: form
    attributes:
      label: 运行形态
      options:
        - 桌面形态
        - 服务器形态
        - 两者
    validations:
      required: true
  - type: dropdown
    id: issuance
    attributes:
      label: 涉及的签发方式
      options:
        - 自签根 CA
        - ACME(HTTP-01)
        - ACME(DNS-01)
        - 不涉及 / 不确定
  - type: input
    id: version
    attributes:
      label: 版本 / commit
      placeholder: 0.1.0 或 git 短 hash
  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 15
  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图(可选)
      description: 相关日志请脱敏,不要粘贴私钥或账户密钥。
